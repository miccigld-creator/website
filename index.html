<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-size: 14px;
            font-family: 'Inter', sans-serif; /* Adds Inter */
            font-weight: 300;                 /* 300 is the standard weight for 'Light' */
            background-color: #EDEDED;
            height: 100vh;
            display: grid;
            grid-template-rows: 70px 1fr 36px;
        }

        .header, .footer {
            background-color: #0A0A0A;
            color: #EFEFEF;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;          
        }

        .header-buttons {
            display: flex;
            gap: 8px; /* Sets the spacing between the buttons */
        }

        .btn-text {
            display: none;
        }

        .btn-solid, .btn-outline {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            /* Default to icon-only size (mobile) */
            padding: 8px;
            width: 40px;
            height: 40px;
            border-radius: 50%; /* Makes them circular for icons */
            background: transparent;
            border: 1px solid #EFEFEF;
        }

        .btn-solid { background: #EFEFEF; color: #0A0A0A; }
        .btn-outline { border: 1px solid #EFEFEF; color: #EFEFEF; }

        .btn-solid:hover {
            background-color: #c7c7c7;
            color:#0A0A0A;
            border: 1px solid #aaaaaa;            
        }

        .btn-outline:hover {
            background-color: #222222;
            border: 1px solid #c9c9c9;
            color: #EFEFEF;                        
        }        

        .content-wrapper {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px; /* Maintains the horizontal spacing */
            gap: 16px;
        }

        .portfolio-canvas {
            display: grid;
            gap: 24px;
            padding: 24px;
            width: 100%;
            height: 100%;
            max-width: 1440px;
            margin: 0 auto;
            overflow-y: auto;
            align-content: start;
        }

        .portfolio-card {
            background-color: #000;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 16 / 9;
            position: relative;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition:
            transform .3s,
            box-shadow .3s;
        }

        .card-1 {
            background-image: url("01.avif");
        }

        .card-2 {
            background-image: url("02.avif");
        }

        .card-3 {
            background-image: url("03.avif");
        }

        .card-4 {
            background-image: url("04.avif");
        }

        .play-overlay {
            position: absolute;
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
        }

        .play-overlay img {
            position: absolute;
            width: 32px;
            height: 32px;
        }

        dialog {
            border: none;
            padding: 0;
            background: #000;
            max-width: 900px;
            width: 90%;
            margin: auto;
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.85); /* Darkens background */
        }

        #close-modal {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
        }

        video {
            width: 100%;
            display: block;
        }

        /* 600px - 767px (Tablet Compact) */
        @media (min-width: 600px) {

        .portfolio-canvas {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px; /* This defines the space between cards */
            padding: 24px;
            /* Ensure the canvas doesn't force a specific height that clips the gap */
            height: auto; 
            overflow-y: visible;
        }

        .portfolio-card {
                /* Ensures the card never shrinks below 310px height */
                min-height: 310px;
                aspect-ratio: 16 / 7;
            }

        .btn-solid, .btn-outline {
            padding: 8px 24px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            border-radius: 50px;
            width: auto;
            height: 40px;
        }

       .btn-solid {
            border: 1px solid #EFEFEF;
            background: #EFEFEF;
            color: #0A0A0A;
        }

        .btn-text {
                display: inline;
        }

        .btn-icon {
                display: none;
        }

        .header-buttons {
            display: flex;
            gap: 16px; /* Sets the spacing between the buttons */
        }

        }

        /* 768px+ (Tablet Landscape & Desktop) */
        @media (min-width: 768px) {
            .portfolio-card {
                /* Ensures the card never shrinks below 310px height */
                min-height: 310px;
                aspect-ratio: 16 / 7;
            }

            .header-headline {
                font-size: 20px;
            }

            body {
            font-size: 16px;
            }
        }

        /* 1024px+ (Desktop refinement) */
        @media (min-width: 1024px) {
            .portfolio-canvas {
                grid-template-columns: repeat(4, 1fr);
                align-content: center;
            }
            .portfolio-card {
                aspect-ratio: 7 / 16;
            }

            .play-overlay {
                opacity: 0;
            }
            
            .portfolio-card:hover .play-overlay {
                opacity: 1;
            }
 
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="content-wrapper">
        <div class="header-headline">Cheap products don't need 3D. Yours do.</div>
            <div class="header-buttons">
                <button class="btn-solid">
                    <span class="btn-text">contact</span>
                    <span class="btn-icon"><img src="mail-icon.svg" alt="contact"></span>
                </button>
                <button class="btn-outline">
                    <span class="btn-text">about me</span>
                    <span class="btn-icon"><img src="user-icon.svg" alt="contact"></span>
                </button>
            </div>
        </div>
    </header>

    <main class="portfolio-canvas">
       <div class="portfolio-card card-1" data-video="https://res.cloudinary.com/dtvb8gznn/video/upload/v1782610059/Skin_Ceuticals_Final_x3lg2e.mp4">
            <div class="play-overlay">
                <img src="play-icon.svg" alt="contact">
            </div>
        </div>
        <div class="portfolio-card card-2" data-video="https://res.cloudinary.com/dtvb8gznn/video/upload/v1782609555/Blas-final-with-sound_lc0dz7.mp4">
            <div class="play-overlay">
                <img src="play-icon.svg" alt="contact">
            </div>
        </div>
        <div class="portfolio-card card-3" data-video="https://res.cloudinary.com/dtvb8gznn/video/upload/v1782610530/Tata-Harper-Cream-Final_pshwga.mp4">
            <div class="play-overlay">
                <img src="play-icon.svg" alt="contact">
            </div>
        </div>
        <div class="portfolio-card card-4" data-video="https://res.cloudinary.com/dtvb8gznn/video/upload/v1782610018/Estee_Lauder_Final_Louder_Music_txdhw6.mp4">
            <div class="play-overlay">
                <img src="play-icon.svg" alt="contact">
            </div></div>
    </main>

    <footer class="footer">
        <div class="content-wrapper">
        <div style="display: flex; align-items:center;"><img src="logo.png" alt="Logo" style="height: 36px;">Miki G</div>
        <div>&copy; 2026</div>
        </div>
    </footer>
    <!-- Video Modal -->
<dialog id="video-modal">
    <button id="close-modal">✕</button>
    <video id="modal-video" controls>
        <source id="video-source" src="" type="video/mp4">
    </video>
</dialog>
<script>
    const modal = document.getElementById('video-modal');
    const closeBtn = document.getElementById('close-modal');
    const video = document.getElementById('modal-video');
    const videoSource = document.getElementById('video-source');

    document.querySelectorAll('.portfolio-card').forEach(card => {
        card.addEventListener('click', () => {
            // Get the URL from the clicked card
            const videoUrl = card.getAttribute('data-video');
            
            // Set the new source and load it
            videoSource.setAttribute('src', videoUrl);
            video.load(); 
            
            modal.showModal();
            video.play();
        });
    });

    function closeModal() {
        video.pause();
        video.currentTime = 0;
        modal.close();
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });
</script>
</body>
</html>
